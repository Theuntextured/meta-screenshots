modLoader="javafml"

# A version range to match for said mod loader - for regular FML @Mod it will be the FML version. This is currently 2.
loaderVersion="${loader_version_range}"

license="${mod_license}"

issueTrackerURL="https://github.com/Theuntextured/meta-screenshots/issues/"

[[mods]]

modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"

# A URL to query for updates for this mod. See the JSON update specification https://docs.neoforged.net/docs/misc/updatechecker/
#updateJSONURL="https://change.me.example.invalid/updates.json" #optional

displayURL="https://github.com/Theuntextured/meta-screenshots"

logoFile="assets/metascreenshots/icon.png"
#credits="" #optional
authors="The untextured"
description='''
A mod that adds metadata to screenshots allowing you to view them from map mods such as Xaero's World Map.
'''

[[mixins]]
config="${mod_id}.mixins.json"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
